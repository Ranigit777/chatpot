<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPot - AI Assistant</title>
    <meta name="description" content="Engage with ChatPot, your intelligent AI chat assistant powered by Hugging Face.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="chat-header">
            <div class="logo-container">
                <div class="logo-pulse"></div>
                <h1>ChatPot</h1>
            </div>
            <p class="subtitle">Intelligent Conversations</p>
        </header>

        <main class="chat-window" id="chatWindow">
            <div class="message system-message">
                <div class="avatar system-avatar">AI</div>
                <div class="message-bubble">
                    Hello! I'm ChatPot. How can I assist you today?
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chatForm" class="input-form">
                <input type="text" id="userInput" placeholder="Message ChatPot..." autocomplete="off" required>
                <button type="submit" id="sendBtn" class="send-button" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
            <div class="footer-text">ChatPot can make mistakes. Verify important info.</div>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
